name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build + publish macOS artifacts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build CLI + menu-bar app + .app bundle
        run: |
          bash scripts/install-app.sh "$RUNNER_TEMP/apps"   # builds dist/kickbacks + dist/Kickbacks.app
          cp app/.build/release/KickbacksBar dist/kickbacks-bar

      - name: Package artifacts
        run: |
          cd dist
          zip -j kickbacks-cli-macos.zip kickbacks kickbacks-bar
          ditto -c -k --keepParent Kickbacks.app Kickbacks.app.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kickbacks-cli-macos.zip
            dist/Kickbacks.app.zip
          generate_release_notes: true

      # Auto-bump the formula's url + sha256 to this tag so `brew upgrade kickbacks` tracks
      # releases (the build-from-source formula keys off the tag's source tarball).
      - name: Bump Homebrew formula to the tagged version
        run: |
          tag="${GITHUB_REF_NAME}"
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"
          sha="$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')"
          sed -i '' -E "s#archive/refs/tags/v[0-9][0-9.]*\.tar\.gz#archive/refs/tags/${tag}.tar.gz#" Formula/kickbacks.rb
          sed -i '' -E "s#sha256 \"(replace_on_release|[a-f0-9]{64})\"#sha256 \"${sha}\"#" Formula/kickbacks.rb
          if git diff --quiet Formula/kickbacks.rb; then
            echo "formula already current"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Formula/kickbacks.rb
            git commit -m "chore(brew): kickbacks ${tag}"
            git push origin HEAD:main || echo "main moved ahead; formula push skipped"
          fi
