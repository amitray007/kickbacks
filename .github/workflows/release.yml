name: Release

# release-please drives versioning from conventional commits: it keeps an open "release PR"
# that bumps cli/package.json + CHANGELOG.md; merging it tags the version, cuts the GitHub
# release, then this same run builds the macOS artifacts and bumps the Homebrew formula.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below runs only on the push that actually cuts a release.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          xcode-version: latest-stable

      - name: Build artifacts, upload to the release, bump the formula
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          bash scripts/install-app.sh "$RUNNER_TEMP/apps"   # builds dist/kickbacks + dist/Kickbacks.app
          cp app/.build/release/KickbacksBar dist/kickbacks-bar
          (cd dist && zip -j kickbacks-cli-macos.zip kickbacks kickbacks-bar && ditto -c -k --keepParent Kickbacks.app Kickbacks.app.zip)
          gh release upload "$TAG" dist/kickbacks-cli-macos.zip dist/Kickbacks.app.zip --clobber

          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          sha="$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')"
          sed -i '' -E "s#archive/refs/tags/v[0-9][0-9.]*\.tar\.gz#archive/refs/tags/${TAG}.tar.gz#" Formula/kickbacks.rb
          sed -i '' -E "s#sha256 \"(replace_on_release|[a-f0-9]{64})\"#sha256 \"${sha}\"#" Formula/kickbacks.rb
          # main is branch-protected, so land the formula bump via an auto-merged PR.
          if ! git diff --quiet Formula/kickbacks.rb; then
            branch="brew-bump-${TAG}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git switch -c "$branch"
            git add Formula/kickbacks.rb
            git commit -m "chore(brew): kickbacks ${TAG}"
            git push origin "$branch"
            gh pr create --base main --head "$branch" \
              --title "chore(brew): kickbacks ${TAG}" --body "Automated Homebrew formula bump for ${TAG}."
            gh pr merge "$branch" --squash --auto || echo "formula PR opened — merge it to publish the brew bump"
          fi
