name: Release

# release-please drives versioning from conventional commits: it keeps an open "release PR"
# that bumps cli/package.json + CHANGELOG.md; merging it tags the version, cuts the GitHub
# release, then this same run builds the macOS artifacts and bumps the Homebrew formula.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below runs only on the push that actually cuts a release.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          xcode-version: latest-stable

      - name: Build artifacts, upload to the release, bump formula + cask
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          bash scripts/install-app.sh "$RUNNER_TEMP/apps"   # builds dist/kickbacks + dist/Kickbacks.app
          cp app/.build/release/KickbacksBar dist/kickbacks-bar

          # CLI zip (formula) + app zip (legacy direct download)
          (cd dist && zip -j kickbacks-cli-macos.zip kickbacks kickbacks-bar && ditto -c -k --keepParent Kickbacks.app Kickbacks.app.zip)

          # DMG for cask (drag-to-Applications UX)
          mkdir -p /tmp/kickbacks-dmg
          cp -R dist/Kickbacks.app /tmp/kickbacks-dmg/
          ln -s /Applications /tmp/kickbacks-dmg/Applications
          hdiutil create -volname "Kickbacks" -srcfolder /tmp/kickbacks-dmg -ov -format UDZO dist/Kickbacks.dmg

          gh release upload "$TAG" dist/kickbacks-cli-macos.zip dist/Kickbacks.app.zip dist/Kickbacks.dmg --clobber

          # Bump Formula/kickbacks.rb (prebuilt CLI zip url + sha256).
          formula_sha="$(shasum -a 256 dist/kickbacks-cli-macos.zip | awk '{print $1}')"
          sed -i '' -E "s#/releases/download/v[0-9][0-9.]*/kickbacks-cli-macos\.zip#/releases/download/${TAG}/kickbacks-cli-macos.zip#" Formula/kickbacks.rb
          sed -i '' -E "s#sha256 \"(replace_on_release|[a-f0-9]{64})\"#sha256 \"${formula_sha}\"#" Formula/kickbacks.rb

          # Bump Casks/kickbacks.rb (DMG version + sha256).
          cask_sha="$(shasum -a 256 dist/Kickbacks.dmg | awk '{print $1}')"
          sed -i '' -E "s#version \"[0-9][0-9.]*\"#version \"${TAG#v}\"#" Casks/kickbacks.rb
          sed -i '' -E "s#sha256 \"(replace_on_release|[a-f0-9]{64})\"#sha256 \"${cask_sha}\"#" Casks/kickbacks.rb

          # Land both bumps via an auto-merged PR (main is branch-protected).
          if ! git diff --quiet Formula/kickbacks.rb Casks/kickbacks.rb; then
            branch="brew-bump-${TAG}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git switch -c "$branch"
            git add Formula/kickbacks.rb Casks/kickbacks.rb
            git commit -m "chore(brew): kickbacks ${TAG}"
            git push origin "$branch"
            gh pr create --base main --head "$branch" \
              --title "chore(brew): kickbacks ${TAG}" --body "Automated Homebrew formula + cask bump for ${TAG}."
            gh pr merge "$branch" --squash --auto || echo "brew-bump PR opened — merge it to publish the bump"
          fi
