version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current — Dependabot opens PRs that bump the pinned
  # commit (and the `# vX` comment), so pinning stays secure *and* up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
